<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect width="256" height="256" rx="56" fill="#0e1b24"/>

  <!-- sofa back -->
  <rect x="44" y="138" width="168" height="40" rx="15" fill="#2f6f8f"/>
  <!-- sofa arms -->
  <rect x="38" y="136" width="26" height="66" rx="13" fill="#3d8bb0"/>
  <rect x="192" y="136" width="26" height="66" rx="13" fill="#3d8bb0"/>
  <!-- seat -->
  <rect x="52" y="164" width="152" height="34" rx="13" fill="#5aa6c9"/>
  <!-- legs -->
  <rect x="66" y="198" width="12" height="16" rx="4" fill="#16242c"/>
  <rect x="178" y="198" width="12" height="16" rx="4" fill="#16242c"/>

  <!-- person: head resting back on left arm, body reclined, legs up the seat -->
  <!-- legs -->
  <rect x="112" y="150" width="86" height="18" rx="9" fill="#ffcf86"/>
  <!-- thigh/knee bend -->
  <rect x="96" y="138" width="34" height="18" rx="9" fill="#ffcf86" transform="rotate(28 96 138)"/>
  <!-- torso reclined -->
  <rect x="70" y="126" width="52" height="20" rx="10" fill="#ffcf86" transform="rotate(14 70 126)"/>
  <!-- head -->
  <circle cx="74" cy="124" r="15" fill="#ffcf86"/>
  <!-- arm up to phone -->
  <rect x="86" y="96" width="12" height="34" rx="6" fill="#ffcf86" transform="rotate(-18 86 96)"/>

  <!-- phone held up -->
  <rect x="92" y="74" width="24" height="36" rx="5" fill="#0e1b24" stroke="#7fd3ff" stroke-width="3"/>
  <text x="104" y="98" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="700" fill="#7fd3ff">&lt;/&gt;</text>
  <!-- live sparkles off the phone -->
  <circle cx="126" cy="72" r="3.4" fill="#7fd3ff"/>
  <circle cx="138" cy="84" r="2.4" fill="#9fe0ff"/>
  <circle cx="132" cy="60" r="2" fill="#9fe0ff"/>
</svg>
